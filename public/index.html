<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谁是卧底 - 多人在线游戏</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .game-title {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .room-card {
            transition: all 0.3s ease;
        }
        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .status-badge {
            font-size: 0.85rem;
        }
        .nav-link {
            color: white !important;
        }
        .nav-link:hover {
            color: #ffd700 !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand game-title text-white fw-bold fs-3" href="#">🎭 谁是卧底</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" id="nav-login" style="display:none;">
                        <button class="nav-link btn btn-link" data-bs-toggle="modal" data-bs-target="#loginModal">登录</button>
                    </li>
                    <li class="nav-item" id="nav-register" style="display:none;">
                        <button class="nav-link btn btn-link" data-bs-toggle="modal" data-bs-target="#registerModal">注册</button>
                    </li>
                    <li class="nav-item" id="nav-user" style="display:none;">
                        <span class="nav-link" id="nav-username"></span>
                    </li>
                    <li class="nav-item" id="nav-profile" style="display:none;">
                        <a class="nav-link" href="/profile">我的战绩</a>
                    </li>
                    <li class="nav-item" id="nav-logout" style="display:none;">
                        <button class="nav-link btn btn-link" id="btn-logout">退出</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card p-4 mb-4">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h3 class="mb-0">房间列表</h3>
                </div>
                <div class="col-md-6 text-end">
                    <button class="btn btn-primary btn-lg" id="btn-create-room" data-bs-toggle="modal" data-bs-target="#createRoomModal">
                        ➕ 创建房间
                    </button>
                </div>
            </div>
        </div>

        <div class="row" id="room-list">
            <div class="col-12 text-center text-white py-5">
                <p class="fs-4">暂无房间，快来创建一个吧！</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">登录</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="login-form">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" id="login-username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" class="form-control" id="login-password" required>
                        </div>
                        <div class="alert alert-danger d-none" id="login-error"></div>
                        <button type="submit" class="btn btn-primary w-100">登录</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="registerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">注册</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="register-form">
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" class="form-control" id="register-username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" class="form-control" id="register-password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">确认密码</label>
                            <input type="password" class="form-control" id="register-password2" required>
                        </div>
                        <div class="alert alert-danger d-none" id="register-error"></div>
                        <button type="submit" class="btn btn-primary w-100">注册</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createRoomModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">创建房间</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="create-room-form">
                        <div class="mb-3">
                            <label class="form-label">房间名称</label>
                            <input type="text" class="form-control" id="room-name" placeholder="请输入房间名称">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">最大人数</label>
                            <select class="form-select" id="room-max-players">
                                <option value="4">4人</option>
                                <option value="5">5人</option>
                                <option value="6">6人</option>
                                <option value="7">7人</option>
                                <option value="8" selected>8人</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">创建并进入</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="joinRoomModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">加入房间</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-3">请登录后加入房间</p>
                    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#loginModal">
                        去登录
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentUser = null;

        async function checkLogin() {
            try {
                const response = await fetch('/api/user');
                const data = await response.json();
                if (data.success) {
                    currentUser = data.user;
                    updateNav(true);
                    
                    if (data.activeRoom) {
                        if (data.activeRoom.status === 'playing') {
                            localStorage.setItem('reconnectRoomData', JSON.stringify(data.activeRoom));
                            window.location.href = `/game/${data.activeRoom.roomId}`;
                        } else {
                            window.location.href = `/room/${data.activeRoom.roomId}`;
                        }
                    }
                } else {
                    updateNav(false);
                }
            } catch (error) {
                updateNav(false);
            }
        }

        function updateNav(isLoggedIn) {
            if (isLoggedIn) {
                document.getElementById('nav-login').style.display = 'none';
                document.getElementById('nav-register').style.display = 'none';
                document.getElementById('nav-user').style.display = 'block';
                document.getElementById('nav-profile').style.display = 'block';
                document.getElementById('nav-logout').style.display = 'block';
                document.getElementById('nav-username').textContent = `👋 ${currentUser.username}`;
            } else {
                document.getElementById('nav-login').style.display = 'block';
                document.getElementById('nav-register').style.display = 'block';
                document.getElementById('nav-user').style.display = 'none';
                document.getElementById('nav-profile').style.display = 'none';
                document.getElementById('nav-logout').style.display = 'none';
            }
        }

        async function loadRooms() {
            try {
                const response = await fetch('/api/rooms');
                const data = await response.json();
                
                const roomList = document.getElementById('room-list');
                
                if (data.rooms.length === 0) {
                    roomList.innerHTML = `
                        <div class="col-12 text-center text-white py-5">
                            <p class="fs-4">暂无房间，快来创建一个吧！</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                data.rooms.forEach(room => {
                    const statusText = room.status === 'waiting' ? '等待中' : '游戏中';
                    const statusClass = room.status === 'waiting' ? 'bg-success' : 'bg-warning';
                    
                    html += `
                        <div class="col-md-4 mb-4">
                            <div class="card room-card p-4">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <h5 class="card-title mb-0">${room.name}</h5>
                                    <span class="badge ${statusClass} status-badge">${statusText}</span>
                                </div>
                                <p class="text-muted mb-2">房间号: ${room.id}</p>
                                <p class="mb-3">
                                    <span class="fw-bold">${room.currentPlayers}</span> / ${room.maxPlayers} 人
                                </p>
                                <button class="btn btn-primary w-100 join-room-btn" 
                                        data-room-id="${room.id}"
                                        ${room.status !== 'waiting' || room.currentPlayers >= room.maxPlayers ? 'disabled' : ''}>
                                    ${room.status !== 'waiting' ? '游戏进行中' : 
                                      room.currentPlayers >= room.maxPlayers ? '房间已满' : '加入房间'}
                                </button>
                            </div>
                        </div>
                    `;
                });
                
                roomList.innerHTML = html;

                document.querySelectorAll('.join-room-btn:not([disabled])').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const roomId = btn.dataset.roomId;
                        if (currentUser) {
                            localStorage.setItem('joinRoomId', roomId);
                            window.location.href = `/room/${roomId}`;
                        } else {
                            const modal = new bootstrap.Modal(document.getElementById('joinRoomModal'));
                            modal.show();
                        }
                    });
                });
            } catch (error) {
                console.error('加载房间失败:', error);
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (data.success) {
                    currentUser = data.user;
                    bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
                    updateNav(true);
                    document.getElementById('login-form').reset();
                    errorDiv.classList.add('d-none');
                    
                    const joinRoomId = localStorage.getItem('joinRoomId');
                    if (joinRoomId) {
                        localStorage.removeItem('joinRoomId');
                        window.location.href = `/room/${joinRoomId}`;
                    }
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.classList.remove('d-none');
                }
            } catch (error) {
                errorDiv.textContent = '登录失败，请稍后重试';
                errorDiv.classList.remove('d-none');
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const password2 = document.getElementById('register-password2').value;
            const errorDiv = document.getElementById('register-error');

            if (password !== password2) {
                errorDiv.textContent = '两次输入的密码不一致';
                errorDiv.classList.remove('d-none');
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (data.success) {
                    currentUser = data.user;
                    bootstrap.Modal.getInstance(document.getElementById('registerModal')).hide();
                    updateNav(true);
                    document.getElementById('register-form').reset();
                    errorDiv.classList.add('d-none');
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.classList.remove('d-none');
                }
            } catch (error) {
                errorDiv.textContent = '注册失败，请稍后重试';
                errorDiv.classList.remove('d-none');
            }
        });

        document.getElementById('btn-logout').addEventListener('click', async () => {
            try {
                await fetch('/api/logout', { method: 'POST' });
                currentUser = null;
                updateNav(false);
            } catch (error) {
                console.error('退出失败:', error);
            }
        });

        document.getElementById('create-room-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!currentUser) {
                const modal = new bootstrap.Modal(document.getElementById('joinRoomModal'));
                modal.show();
                return;
            }

            const roomName = document.getElementById('room-name').value || `${currentUser.username}的房间`;
            const maxPlayers = parseInt(document.getElementById('room-max-players').value);

            localStorage.setItem('createRoomData', JSON.stringify({
                roomName,
                maxPlayers
            }));

            window.location.href = `/room/new`;
        });

        document.getElementById('btn-create-room').addEventListener('click', () => {
            if (!currentUser) {
                const modal = new bootstrap.Modal(document.getElementById('joinRoomModal'));
                modal.show();
                return;
            }
        });

        checkLogin();
        loadRooms();
        
        setInterval(loadRooms, 5000);
    </script>
</body>
</html>
