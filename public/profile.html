<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人战绩 - 谁是卧底</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 15px;
        }
        .stat-card .number {
            font-size: 2.5rem;
            font-weight: bold;
        }
        .stat-card .label {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        .game-record {
            transition: all 0.3s ease;
        }
        .game-record:hover {
            background-color: rgba(102, 126, 234, 0.1);
            transform: translateX(5px);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .win-badge {
            background-color: #198754;
            color: white;
        }
        .lose-badge {
            background-color: #dc3545;
            color: white;
        }
        .spy-role {
            color: #dc3545;
            font-weight: bold;
        }
        .civilian-role {
            color: #198754;
            font-weight: bold;
        }
        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: white;
            margin: 0 auto;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand text-white fw-bold fs-3" href="/">🎭 谁是卧底</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/">🏠 返回大厅</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card p-4 mb-4">
            <div class="row align-items-center">
                <div class="col-md-3 text-center">
                    <div class="avatar" id="user-avatar">?</div>
                </div>
                <div class="col-md-9">
                    <h2 class="mb-2" id="user-name">加载中...</h2>
                    <p class="text-muted mb-0">玩家档案</p>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-3 mb-3 mb-md-0">
                <div class="stat-card">
                    <div class="number" id="stat-total">0</div>
                    <div class="label">总场次</div>
                </div>
            </div>
            <div class="col-md-3 mb-3 mb-md-0">
                <div class="stat-card">
                    <div class="number" id="stat-wins">0</div>
                    <div class="label">胜利场次</div>
                </div>
            </div>
            <div class="col-md-3 mb-3 mb-md-0">
                <div class="stat-card">
                    <div class="number" id="stat-losses">0</div>
                    <div class="label">失败场次</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="number" id="stat-winrate">0%</div>
                    <div class="label">胜率</div>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <h4 class="mb-4">📋 历史记录</h4>
            <div id="game-records">
                <div class="text-center py-5 text-muted">
                    <p class="fs-4">暂无游戏记录</p>
                    <p>快去玩一局吧！</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentUser = null;

        async function init() {
            try {
                const userResponse = await fetch('/api/user');
                const userData = await userResponse.json();
                
                if (!userData.success) {
                    window.location.href = '/';
                    return;
                }
                
                currentUser = userData.user;
                
                document.getElementById('user-name').textContent = currentUser.username;
                document.getElementById('user-avatar').textContent = currentUser.username.charAt(0);
                
                await loadGameRecords();
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        async function loadGameRecords() {
            try {
                const response = await fetch(`/api/games/${currentUser.id}`);
                const data = await response.json();
                
                if (data.success) {
                    updateStats(data.stats);
                    updateGameRecords(data.games);
                }
            } catch (error) {
                console.error('加载游戏记录失败:', error);
            }
        }

        function updateStats(stats) {
            document.getElementById('stat-total').textContent = stats.totalGames;
            document.getElementById('stat-wins').textContent = stats.wins;
            document.getElementById('stat-losses').textContent = stats.totalGames - stats.wins;
            document.getElementById('stat-winrate').textContent = stats.winRate + '%';
        }

        function updateGameRecords(games) {
            const recordsDiv = document.getElementById('game-records');
            
            if (games.length === 0) {
                recordsDiv.innerHTML = `
                    <div class="text-center py-5 text-muted">
                        <p class="fs-4">暂无游戏记录</p>
                        <p>快去玩一局吧！</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="list-group">';
            
            games.forEach(game => {
                const roleClass = game.role === '卧底' ? 'spy-role' : 'civilian-role';
                const resultBadge = game.isWin ? 
                    '<span class="badge win-badge">胜利</span>' : 
                    '<span class="badge lose-badge">失败</span>';
                
                const formatDate = (dateStr) => {
                    const date = new Date(dateStr);
                    return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                };

                html += `
                    <div class="list-group-item game-record border-0 mb-2 rounded">
                        <div class="row align-items-center">
                            <div class="col-md-2">
                                ${resultBadge}
                            </div>
                            <div class="col-md-3">
                                <span>房间号: <strong>${game.roomId}</strong></span>
                            </div>
                            <div class="col-md-2">
                                <span>身份: <span class="${roleClass}">${game.role}</span></span>
                            </div>
                            <div class="col-md-2">
                                <span>词语: <strong>${game.word}</strong></span>
                            </div>
                            <div class="col-md-3 text-end text-muted">
                                ${formatDate(game.createdAt)}
                            </div>
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            recordsDiv.innerHTML = html;
        }

        init();
    </script>
</body>
</html>
