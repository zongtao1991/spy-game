<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏中 - 谁是卧底</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .word-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }
        .player-card {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .player-card:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }
        .player-card.speaking {
            border-color: #ffc107;
            animation: pulse 1s infinite;
        }
        .player-card.eliminated {
            opacity: 0.5;
            cursor: default;
        }
        .player-card.selected {
            border-color: #dc3545;
            background: rgba(220, 53, 69, 0.3);
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(255, 193, 7, 0); }
        }
        .avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            margin: 0 auto 10px;
        }
        .chat-box {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 15px;
        }
        .chat-message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
        }
        .chat-message .username {
            font-weight: bold;
            color: #667eea;
        }
        .chat-message .time {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin-left: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .phase-indicator {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
        }
        .modal-content {
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 15px;
        }
        .modal-header {
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .winner-badge {
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand text-white fw-bold fs-3" href="/">🎭 谁是卧底</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link phase-indicator" id="phase-indicator">准备中</span>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-8">
                <div class="card p-4 mb-4">
                    <h5 class="mb-3">📋 你的词语</h5>
                    <div class="word-card" id="my-word-card">
                        <p class="text-white-50 mb-2">等待游戏开始...</p>
                        <h2 id="my-word" style="display:none;">---</h2>
                        <p class="text-white-50 mt-2" id="my-role" style="display:none;"></p>
                    </div>
                </div>

                <div class="card p-4 mb-4" id="description-area" style="display:none;">
                    <h5 class="mb-3">🎤 描述阶段</h5>
                    <div class="alert alert-info" id="current-speaker-info">
                        等待发言...
                    </div>
                    <div class="mb-3" id="my-description-area" style="display:none;">
                        <textarea class="form-control" id="description-input" rows="3" 
                                  placeholder="请描述你的词语（不能直接说出词语）..."></textarea>
                        <button class="btn btn-primary mt-2" id="btn-submit-description">提交描述</button>
                    </div>
                </div>

                <div class="card p-4 mb-4" id="voting-area" style="display:none;">
                    <h5 class="mb-3">🗳️ 投票阶段</h5>
                    <p class="text-white-50 mb-3">请投票选出你认为是卧底的人：</p>
                    <div class="row" id="voting-players">
                    </div>
                    <button class="btn btn-danger mt-3" id="btn-submit-vote" style="display:none;">确认投票</button>
                </div>

                <div class="card p-4">
                    <h5 class="mb-3">👥 玩家</h5>
                    <div class="row" id="player-list">
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card p-4">
                    <h5 class="mb-3">💬 聊天</h5>
                    <div class="chat-box" id="chat-box">
                    </div>
                    <div class="input-group">
                        <input type="text" class="form-control" id="chat-input" placeholder="输入消息...">
                        <button class="btn btn-primary" id="btn-send-chat">发送</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="resultModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="result-title">投票结果</h5>
                </div>
                <div class="modal-body text-center" id="result-content">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" id="btn-result-next">继续</button>
                    <button class="btn btn-success" id="btn-result-back" style="display:none;">返回大厅</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="errorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">提示</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="error-message">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal" id="error-btn">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let socket = null;
        let currentUser = null;
        let currentRoomId = null;
        let myWord = null;
        let myRole = null;
        let selectedVoteTarget = null;
        let playersData = [];

        const pathParts = window.location.pathname.split('/');
        currentRoomId = pathParts[pathParts.length - 1];

        async function init() {
            try {
                const response = await fetch('/api/user');
                const data = await response.json();
                
                if (!data.success) {
                    window.location.href = '/';
                    return;
                }
                
                currentUser = data.user;
                
                if (data.activeRoom && data.activeRoom.myWord) {
                    myWord = data.activeRoom.myWord;
                    myRole = data.activeRoom.myRole;
                    
                    document.getElementById('my-word').textContent = myWord;
                    document.getElementById('my-word').style.display = 'block';
                    document.getElementById('my-role').textContent = `你的身份：${myRole}（${data.activeRoom.myWordCategory || '未知'}）`;
                    document.getElementById('my-role').style.display = 'block';
                    document.querySelector('#my-word-card p:first-child').style.display = 'none';
                    
                    if (data.activeRoom.gamePhase === 'voting') {
                        updatePhase('描述阶段');
                    } else {
                        updatePhase(data.activeRoom.gamePhase === 'description' ? '描述阶段' : '准备中');
                    }
                }
                
                socket = io();
                
                setupSocketEvents();
                joinGame();
            } catch (error) {
                window.location.href = '/';
            }
        }

        function setupSocketEvents() {
            socket.on('connect', () => {
                console.log('已连接到服务器');
            });

            socket.on('wordAssigned', (data) => {
                myWord = data.word;
                myRole = data.role;
                
                document.getElementById('my-word').textContent = myWord;
                document.getElementById('my-word').style.display = 'block';
                document.getElementById('my-role').textContent = `你的身份：${myRole}（${data.category}）`;
                document.getElementById('my-role').style.display = 'block';
                document.querySelector('#my-word-card p:first-child').style.display = 'none';
            });

            socket.on('gameStarted', (data) => {
                updatePhase('描述阶段');
                playersData = data.players;
                updatePlayerList(data.players);
                showDescriptionArea(data.currentSpeaker);
            });

            socket.on('nextSpeaker', (data) => {
                playersData = data.players;
                updatePlayerList(data.players);
                showDescriptionArea(data.currentSpeaker);
            });

            socket.on('playerSpoke', (data) => {
                addChatMessage({
                    username: data.username,
                    message: `描述：${data.description}`,
                    timestamp: new Date().toLocaleTimeString(),
                    isSystem: true
                });
            });

            socket.on('votingPhase', (data) => {
                updatePhase('投票阶段');
                playersData = data.players;
                updatePlayerList(data.players);
                showVotingArea(data.players);
            });

            socket.on('voteUpdate', (data) => {
                addChatMessage({
                    username: data.voterName,
                    message: '已投票',
                    timestamp: new Date().toLocaleTimeString(),
                    isSystem: true
                });
            });

            socket.on('votingResult', (data) => {
                showVotingResult(data);
            });

            socket.on('nextRound', (data) => {
                updatePhase('描述阶段');
                playersData = data.players;
                updatePlayerList(data.players);
                showDescriptionArea(data.currentSpeaker);
            });

            socket.on('chatMessage', (data) => {
                addChatMessage(data);
            });

            socket.on('error', (data) => {
                showError(data.message);
            });

            socket.on('disconnect', () => {
                console.log('与服务器断开连接');
                addChatMessage({
                    username: '系统',
                    message: '与服务器断开连接，正在尝试重新连接...',
                    timestamp: new Date().toLocaleTimeString(),
                    isSystem: true
                });
            });

            socket.on('playerDisconnected', (data) => {
                addChatMessage({
                    username: '系统',
                    message: data.message,
                    timestamp: new Date().toLocaleTimeString(),
                    isSystem: true
                });
            });

            socket.on('playerReconnected', (data) => {
                addChatMessage({
                    username: '系统',
                    message: data.message,
                    timestamp: new Date().toLocaleTimeString(),
                    isSystem: true
                });
            });

            socket.on('playerTimeout', (data) => {
                addChatMessage({
                    username: '系统',
                    message: data.message,
                    timestamp: new Date().toLocaleTimeString(),
                    isSystem: true
                });

                if (data.gameOver) {
                    data.voteCount = {};
                    data.isTie = false;
                    data.eliminatedPlayer = null;
                    showVotingResult(data);
                }
            });

            socket.on('reconnected', (data) => {
                addChatMessage({
                    username: '系统',
                    message: '已重新连接到游戏',
                    timestamp: new Date().toLocaleTimeString(),
                    isSystem: true
                });
                updatePhase(data.phase === 'description' ? '描述阶段' : '准备中');
                playersData = data.players;
                updatePlayerList(data.players);
            });

            socket.on('votingReset', (data) => {
                addChatMessage({
                    username: '系统',
                    message: data.message,
                    timestamp: new Date().toLocaleTimeString(),
                    isSystem: true
                });
                updatePhase('描述阶段');
                document.getElementById('voting-area').style.display = 'none';
                document.getElementById('description-area').style.display = 'block';
            });
        }

        function joinGame() {
            socket.emit('joinRoom', {
                userId: currentUser.id,
                username: currentUser.username,
                roomId: currentRoomId
            });
        }

        function updatePhase(phase) {
            document.getElementById('phase-indicator').textContent = phase;
        }

        function updatePlayerList(players) {
            const playerList = document.getElementById('player-list');
            let html = '';
            
            players.forEach(player => {
                const isCurrentUser = player.userId === currentUser.id;
                const isEliminated = !player.isAlive;
                
                html += `
                    <div class="col-md-3 mb-3">
                        <div class="player-card ${isEliminated ? 'eliminated' : ''}" 
                             data-user-id="${player.userId}">
                            <div class="avatar">${player.username.charAt(0)}</div>
                            <h6 class="mb-1">${player.username}${isCurrentUser ? ' (我)' : ''}</h6>
                            ${isEliminated ? '<span class="text-danger">已淘汰</span>' : 
                              player.hasSpoken ? '<span class="text-success">已发言</span>' : 
                              '<span class="text-white-50">等待中</span>'}
                        </div>
                    </div>
                `;
            });

            playerList.innerHTML = html;
        }

        function showDescriptionArea(currentSpeaker) {
            document.getElementById('description-area').style.display = 'block';
            document.getElementById('voting-area').style.display = 'none';

            const isMyTurn = currentSpeaker.userId === currentUser.id;
            
            document.getElementById('current-speaker-info').innerHTML = `
                当前发言：<strong>${currentSpeaker.username}</strong>
                ${isMyTurn ? '<span class="text-warning ms-2">轮到你了！</span>' : ''}
            `;

            document.getElementById('my-description-area').style.display = isMyTurn ? 'block' : 'none';

            document.querySelectorAll('.player-card').forEach(card => {
                if (card.dataset.userId == currentSpeaker.userId) {
                    card.classList.add('speaking');
                } else {
                    card.classList.remove('speaking');
                }
            });
        }

        function showVotingArea(players) {
            document.getElementById('description-area').style.display = 'none';
            document.getElementById('voting-area').style.display = 'block';
            selectedVoteTarget = null;

            const votingPlayers = document.getElementById('voting-players');
            let html = '';

            players.filter(p => p.isAlive && p.userId !== currentUser.id).forEach(player => {
                html += `
                    <div class="col-md-4 mb-3">
                        <div class="player-card" data-user-id="${player.userId}" onclick="selectVote(${player.userId}, this)">
                            <div class="avatar">${player.username.charAt(0)}</div>
                            <h6>${player.username}</h6>
                        </div>
                    </div>
                `;
            });

            votingPlayers.innerHTML = html;
            document.getElementById('btn-submit-vote').style.display = 'none';
        }

        function selectVote(userId, element) {
            document.querySelectorAll('#voting-players .player-card').forEach(card => {
                card.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedVoteTarget = userId;
            document.getElementById('btn-submit-vote').style.display = 'block';
        }

        function showVotingResult(data) {
            const modal = new bootstrap.Modal(document.getElementById('resultModal'));
            const content = document.getElementById('result-content');
            const title = document.getElementById('result-title');
            const nextBtn = document.getElementById('btn-result-next');
            const backBtn = document.getElementById('btn-result-back');

            if (data.gameOver) {
                title.textContent = '🎉 游戏结束';
                content.innerHTML = `
                    <div class="winner-badge">${data.winner === '平民' ? '👥' : '🕵️'}</div>
                    <h2 class="mb-3">${data.winner}获胜！</h2>
                    <p class="text-white-50 mb-3">
                        词语对：<strong>${data.wordPair.normal_word}</strong> vs <strong>${data.wordPair.spy_word}</strong>
                    </p>
                `;
                nextBtn.style.display = 'none';
                backBtn.style.display = 'block';
            } else if (data.isTie) {
                title.textContent = '⚖️ 平局';
                content.innerHTML = `
                    <h4 class="mb-3">投票平局，无人被淘汰</h4>
                    <p class="text-white-50">进入下一轮描述</p>
                `;
                nextBtn.style.display = 'block';
                backBtn.style.display = 'none';
            } else {
                title.textContent = '📊 投票结果';
                const player = data.eliminatedPlayer;
                content.innerHTML = `
                    <div class="avatar mb-3 mx-auto" style="width:80px;height:80px;font-size:32px;">
                        ${player.username.charAt(0)}
                    </div>
                    <h4 class="mb-2">${player.username} 被淘汰</h4>
                    <p class="text-white-50 mb-3">TA的身份是：<strong class="text-${player.role === '卧底' ? 'danger' : 'success'}">${player.role}</strong></p>
                    ${player.role === '平民' ? '<p class="text-warning">⚠️ 平民被误投了！</p>' : 
                      '<p class="text-success">✅ 找出了一名卧底！</p>'}
                `;
                nextBtn.style.display = 'block';
                backBtn.style.display = 'none';
            }

            modal.show();
        }

        function addChatMessage(data) {
            const chatBox = document.getElementById('chat-box');
            const isSystem = data.isSystem;
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chat-message';
            
            if (isSystem) {
                messageDiv.innerHTML = `
                    <span class="text-info">[系统]</span>
                    <span class="username">${data.username}</span>
                    <span>${data.message}</span>
                `;
            } else {
                messageDiv.innerHTML = `
                    <span class="username">${data.username}</span>
                    <span class="time">${data.timestamp}</span>
                    <div>${data.message}</div>
                `;
            }
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showError(message) {
            document.getElementById('error-message').textContent = message;
            const modal = new bootstrap.Modal(document.getElementById('errorModal'));
            modal.show();
        }

        document.getElementById('btn-submit-description').addEventListener('click', () => {
            const description = document.getElementById('description-input').value.trim();
            if (!description) {
                showError('请输入描述内容');
                return;
            }
            
            socket.emit('submitDescription', {
                roomId: currentRoomId,
                userId: currentUser.id,
                description: description
            });
            
            document.getElementById('description-input').value = '';
            document.getElementById('my-description-area').style.display = 'none';
        });

        document.getElementById('btn-submit-vote').addEventListener('click', () => {
            if (!selectedVoteTarget) {
                showError('请选择要投票的人');
                return;
            }
            
            socket.emit('vote', {
                roomId: currentRoomId,
                userId: currentUser.id,
                targetUserId: selectedVoteTarget
            });
            
            document.getElementById('voting-area').style.display = 'none';
            selectedVoteTarget = null;
        });

        document.getElementById('btn-send-chat').addEventListener('click', () => {
            const message = document.getElementById('chat-input').value.trim();
            if (message) {
                socket.emit('chatMessage', {
                    roomId: currentRoomId,
                    userId: currentUser.id,
                    username: currentUser.username,
                    message: message
                });
                document.getElementById('chat-input').value = '';
            }
        });

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('btn-send-chat').click();
            }
        });

        document.getElementById('btn-result-next').addEventListener('click', () => {
            bootstrap.Modal.getInstance(document.getElementById('resultModal')).hide();
        });

        document.getElementById('btn-result-back').addEventListener('click', () => {
            window.location.href = '/';
        });

        document.getElementById('error-btn').addEventListener('click', () => {
            window.location.href = '/';
        });

        init();
    </script>
</body>
</html>
